name: Update Versions

on:
  schedule:
    # Every Monday at 08:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  update-versions:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install tools
        run: |
          curl -sSLo helm-docs.tar.gz https://github.com/norwoodj/helm-docs/releases/download/v1.14.2/helm-docs_1.14.2_Linux_x86_64.tar.gz
          tar -xf helm-docs.tar.gz helm-docs
          sudo mv helm-docs /usr/local/bin/helm-docs

      - name: Get Velociraptor version from velociraptor-docker
        id: velo
        run: |
          # The hardened "<version>-distroless" image is published from velociraptor-docker.
          # Its Dockerfile `ARG VELO_VERSION` is the single source of truth for what is
          # actually built/pushed — track it so the chart never points at a missing tag.
          VELO_VERSION=$(curl -s https://raw.githubusercontent.com/MaximeWewer/velociraptor-docker/main/Dockerfile \
            | grep -oP '^ARG VELO_VERSION=\K\S+')
          if [ -z "$VELO_VERSION" ]; then
            echo "ERROR: could not read ARG VELO_VERSION from velociraptor-docker Dockerfile" >&2
            exit 1
          fi
          # Strip leading 'v' -> semver base used by appVersion and the image tag.
          CORE="${VELO_VERSION#v}"
          echo "core=${CORE}" >> $GITHUB_OUTPUT
          echo "velociraptor-docker pins: ${VELO_VERSION} -> ${CORE}"

      - name: Update Chart.yaml
        run: |
          CORE="${{ steps.velo.outputs.core }}"
          # appVersion tracks the velociraptor release
          sed -i "s/^appVersion: .*/appVersion: \"${CORE}\"/" chart/Chart.yaml

      - name: Update values.yaml
        run: |
          CORE="${{ steps.velo.outputs.core }}"
          # Update the velociraptor image tag (matched via its repository line).
          # The hardened rebuild publishes "<version>-distroless".
          sed -i "\#repository: maximewewer/velociraptor#{n;s/tag: .*/tag: \"${CORE}-distroless\"/}" chart/values.yaml

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected:"
            git diff --stat
          fi

      - name: Align chart version with Velociraptor
        if: steps.changes.outputs.changed == 'true'
        id: bump
        run: |
          BASE="${{ steps.velo.outputs.core }}"
          DATE=$(date -u +'%d-%m-%Y')
          NEW_VERSION="${BASE}-${DATE}"
          sed -i "s/^version: .*/version: ${NEW_VERSION}/" chart/Chart.yaml
          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "Chart version set to: ${NEW_VERSION}"

      - name: Regenerate chart README
        if: steps.changes.outputs.changed == 'true'
        run: |
          CORE="${{ steps.velo.outputs.core }}"
          # Keep the hand-written image.tag reference in sync, then regenerate
          # chart/README.md (Requirements + Values tables) from the template.
          sed -i "/\`image.tag\`/ s|\`[0-9.]*-distroless\`|\`${CORE}-distroless\`|" chart/README.md.gotmpl
          helm-docs --chart-search-root chart

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update versions to Velociraptor ${{ steps.velo.outputs.core }}"
          title: "chore: update versions to Velociraptor ${{ steps.velo.outputs.core }}"
          body: |
            ## Automated version update

            | Component | Version |
            |-----------|---------|
            | velociraptor (appVersion) | `${{ steps.velo.outputs.core }}` |
            | image.tag | `${{ steps.velo.outputs.core }}-distroless` |
            | Chart version | `${{ steps.bump.outputs.version }}` |
          branch: chore/update-versions
          delete-branch: true
