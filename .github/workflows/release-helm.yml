name: Release Helm Chart

on:
  workflow_dispatch:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       github.event.pull_request.head.ref == 'chore/update-versions')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Convert repository owner to lowercase
        id: lowercase
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner=${OWNER_LOWER}" >> $GITHUB_OUTPUT

      - name: Set release version (today's date)
        id: chart
        run: |
          # Chart.yaml carries "<base>-DD-MM-YYYY"; the date was stamped at PR-creation
          # time. Re-stamp it with TODAY's date so the published version reflects the
          # actual release day, then rewrite Chart.yaml so the package matches.
          BASE=$(grep '^version:' chart/Chart.yaml | awk '{print $2}' | sed -E 's/-[0-9]{2}-[0-9]{2}-[0-9]{4}$//')
          DATE=$(date -u +'%d-%m-%Y')
          VERSION="${BASE}-${DATE}"
          sed -i "s/^version: .*/version: ${VERSION}/" chart/Chart.yaml
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: ${VERSION}"

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Update chart dependencies
        run: |
          helm dependency update chart/

      - name: Package Helm chart
        run: |
          helm package chart/

      - name: Push Helm chart to GHCR
        run: |
          helm push velociraptor-${{ steps.chart.outputs.version }}.tgz oci://ghcr.io/${{ steps.lowercase.outputs.owner }}/charts
