{{- if eq (include "velociraptor.overlayEnabled" .) "true" }}
# Config overlay deep-merged onto the base config by the config-merge init
# container. Holds only non-secret fields; oauth_client_secret (OIDC) is injected
# separately from a Secret. Sources: gui.oidc / config.initializeServer / customArtifacts.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "velociraptor.fullname" . }}-config-overlay
  labels:
    {{- include "velociraptor.labels" . | nindent 4 }}
type: Opaque
stringData:
  overlay.yaml: |
{{- if .Values.gui.oidc.enabled }}
    GUI:
      public_url: {{ required "gui.publicUrl is required when gui.oidc.enabled (OIDC redirects)" .Values.gui.publicUrl | quote }}
      authenticator:
        type: oidc
        oidc_issuer: {{ required "gui.oidc.issuer is required when gui.oidc.enabled" .Values.gui.oidc.issuer | quote }}
        oidc_name: {{ .Values.gui.oidc.name | quote }}
        oauth_client_id: {{ .Values.gui.oidc.clientId | quote }}
{{- with .Values.gui.oidc.avatar }}
        avatar: {{ . | quote }}
{{- end }}
{{- end }}
{{- if .Values.config.initializeServer }}
    Frontend:
      initial_server_artifacts:
        - Container.InitializeServer
{{- end }}
{{- if .Values.customArtifacts.enabled }}
    defaults:
      artifact_definitions_directories:
        - {{ .Values.customArtifacts.path | quote }}
{{- end }}
{{- if and .Values.gui.oidc.enabled (not .Values.gui.oidc.existingSecret) }}
---
# Chart-managed OIDC client secret (TEST). Prefer gui.oidc.existingSecret in prod.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "velociraptor.fullname" . }}-oidc
  labels:
    {{- include "velociraptor.labels" . | nindent 4 }}
type: Opaque
stringData:
  oauth_client_secret: {{ required "gui.oidc.clientSecret or gui.oidc.existingSecret is required" .Values.gui.oidc.clientSecret | quote }}
{{- end }}
{{- end }}
